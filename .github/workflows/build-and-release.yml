name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 8
      uses: actions/setup-java@v5
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn clean verify -Pintegration-tests
      
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: brillouin-imaging-fiji-jar
        path: target/brillouin-imaging-fiji-*.jar
        retention-days: 90
        
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v5
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven'

    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: brillouin-imaging-fiji-jar
        path: target/
      
    - name: Get version from tag or set to test
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ ! "$VERSION" =~ -SNAPSHOT$ ]]; then
            VERSION="${VERSION}-SNAPSHOT"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: target/brillouin-imaging-fiji-*.jar
        tag_name: ${{ github.event_name == 'workflow_dispatch' && 'test' || github.ref_name }}
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Brillouin Imaging FIJI Plugin ${{ steps.get_version.outputs.VERSION }}
          
          ### Installation
          1. Download the JAR file below
          2. Copy it to your ImageJ/Fiji plugins folder
          3. Restart ImageJ/Fiji
          
          ### Changes
          See the commit history for details of changes in this release.
        draft: false
        prerelease: ${{ github.event_name == 'workflow_dispatch' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
